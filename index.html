<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokeberu Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #ffffff; color: #1a1a1a; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start py-8 px-4 sm:px-6">

  <header class="w-full max-w-4xl text-center mb-8">
    <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-gray-900 mb-2">Pokeberu Maker</h1>
    <p class="text-sm sm:text-base text-gray-500">초선명 하드웨어 도트 마스크 기술이 탑재된 최신식 무선호출기</p>
  </header>

  <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-start mb-12">
    
    <div class="lg:col-span-6 flex flex-col items-center justify-center w-full">
      <div class="relative w-full max-w-[480px] aspect-[4/3] flex items-center justify-center">
        <canvas id="pagerCanvas" width="960" height="720" class="w-full h-auto cursor-pointer" style="max-width: 480px;"></canvas>
      </div>
      <p class="text-xs text-gray-400 mt-4 text-center">💡 본체의 ESC, SET 버튼을 누르면 부저(Beep)음이 울립니다.</p>
    </div>

    <div class="lg:col-span-6 w-full space-y-6 bg-gray-50 p-6 sm:p-8 rounded-2xl border border-gray-100">
      <div class="bg-white p-4 rounded-xl border border-gray-100 space-y-4">
        <h3 class="text-base font-bold text-gray-800">🎨 기기 외관 설정 (커스텀)</h3>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label for="colorSelect" class="block text-sm font-semibold text-gray-600">본체 색상</label>
            <select id="colorSelect" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-black font-semibold text-gray-800 transition">
              <option value="black" selected>BLACK (기존 매트 블랙)</option>
              <option value="silver">SILVER (메탈릭 실버)</option>
            </select>
          </div>

          <div class="space-y-1.5">
            <label for="logoSelect" class="block text-sm font-semibold text-gray-600">브랜드 로고</label>
            <select id="logoSelect" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-black font-semibold text-gray-800 transition">
              <option value="pocketbell" selected>POCKET BELL</option>
              <option value="motorola">MOTOROLA</option>
            </select>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label for="messageInput" class="block text-base sm:text-lg font-bold text-gray-800">📠 호출 메시지 입력</label>
        <textarea id="messageInput" rows="2" maxlength="40" class="w-full px-4 py-3 text-lg border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-black font-semibold text-gray-800 placeholder-gray-400 resize-none transition">緊急呼出
889-9191</textarea>
      </div>

      <button id="downloadBtn" class="w-full py-4 bg-black hover:bg-gray-800 text-white font-extrabold text-lg rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
        <span>투명 배경 PNG로 저장하기</span>
      </button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('pagerCanvas');
    const ctx = canvas.getContext('2d');
    const messageInput = document.getElementById('messageInput');
    const antennaSelect = document.getElementById('antennaSelect') || { value: '4' };
    const batterySelect = document.getElementById('batterySelect') || { value: '3' };
    const dateInput = document.getElementById('dateInput') || { value: '9月11日' };
    const timeInput = document.getElementById('timeInput') || { value: '11:09 AM' };
    const colorSelect = document.getElementById('colorSelect');
    const logoSelect = document.getElementById('logoSelect');
    const downloadBtn = document.getElementById('downloadBtn');

    let isBacklightOn = false;

    function render(isDownloadMode = false) {
      if (isDownloadMode) ctx.clearRect(0, 0, canvas.width, canvas.height);
      else { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); }

      const originX = 100, originY = 120, deviceW = 760, deviceH = 490, radius = 64;
      const currentBodyColor = colorSelect.value;

      // 본체
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(originX, originY, deviceW, deviceH, radius);
      ctx.fillStyle = currentBodyColor === 'black' ? '#1e2022' : '#cbd5e1';
      ctx.fill();
      ctx.restore();

      // LCD
      const lcdX = 145, lcdY = 160, lcdW = 670, lcdH = 265;
      ctx.fillStyle = '#0f1110';
      ctx.beginPath();
      ctx.roundRect(lcdX, lcdY, lcdW, lcdH, 24);
      ctx.fill();
      ctx.fillStyle = isBacklightOn ? '#7de8cd' : '#abc1a6';
      ctx.beginPath();
      ctx.roundRect(lcdX + 6, lcdY + 6, lcdW - 12, lcdH - 12, 18);
      ctx.fill();

      // 로고
      ctx.save();
      const logoX = 665, logoY = 528;
      const currentLogo = logoSelect.value;

      ctx.textAlign = 'center';
      if (currentLogo === 'pocketbell') {
        ctx.font = 'bold 23px "Inter", sans-serif';
        ctx.fillStyle = currentBodyColor === 'black' ? '#9e8d78' : '#334155'; 
        ctx.fillText('POCKET BELL', logoX, logoY);
      } else if (currentLogo === 'motorola') {
        ctx.font = '900 24px "Inter", sans-serif';
        ctx.fillStyle = currentBodyColor === 'black' ? '#8a94a6' : '#1e293b'; 
        ctx.fillText('MOTOROLA', logoX, logoY);
      }

      ctx.fillStyle = currentBodyColor === 'black' ? '#6e7075' : '#94a3b8';
      ctx.fillRect(logoX - 65, logoY + 12, 130, 2.5);
      ctx.restore();
    }

    [colorSelect, logoSelect, messageInput].forEach(elem => {
      elem.addEventListener('input', () => render());
    });

    downloadBtn.addEventListener('click', () => {
      render(true);
      const link = document.createElement('a');
      link.download = 'pager.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      render(false);
    });

    window.onload = () => render();
  </script>
</body>
</html>
