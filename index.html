<body class="min-h-screen flex flex-col justify-between overflow-x-hidden antialiased bg-white">

        <p class="text-[10px] text-slate-400">Minimal Classic Pager Generator</p>

    <div class="flex items-center space-x-2 text-[11px] text-slate-400 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">

  <main class="flex-1 w-full max-w-5xl mx-auto px-4 md:px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
    
    <!-- Left Column: Realistic Canvas Device Display (7 cols) -->
    <section class="lg:col-span-7 flex flex-col items-center">
      
      <!-- Premium Canvas Container with subtle soft shadow -->
      <div class="relative w-full aspect-[4/3] rounded-2xl bg-slate-50 flex items-center justify-center border border-slate-100 p-2">
        
        <!-- Interactive Tip Overlay -->
        <div class="absolute top-4 left-4 z-10 flex items-center space-x-1.5 bg-white/90 backdrop-blur px-2.5 py-1 rounded-full text-[10px] text-slate-500 border border-slate-100/80 pointer-events-none">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <span>버튼 클릭 시 리얼 비프 사운드 재생</span>
        </div>

        <!-- Canvas Element -->
        <canvas id="pagerCanvas" width="1200" height="900" class="w-full h-auto object-contain cursor-pointer" title="기기의 버튼을 직접 클릭하면 작동 소리가 재생됩니다."></canvas>
      </div>

      <!-- Quick Action Commands -->
      <div class="flex gap-3 mt-6 w-full">
        <button onclick="downloadPagerPNG()" class="flex-1 bg-slate-900 hover:bg-slate-800 active:scale-[0.99] text-white px-5 py-3.5 rounded-xl font-semibold text-xs flex items-center justify-center space-x-2 transition shadow-sm">
          <i class="fa-solid fa-download"></i>
          <span>고해상도 투명 PNG 다운로드</span>
        </button>
        <button onclick="playPagerBeep()" class="bg-slate-50 hover:bg-slate-100 active:scale-[0.99] text-slate-700 px-5 py-3.5 rounded-xl font-medium text-xs flex items-center justify-center space-x-2 border border-slate-200/60 transition">
          <i class="fa-solid fa-volume-high text-slate-400"></i>
          <span>비프 부저음 테스트</span>
        </button>
      </div>

    </section>

    <!-- Right Column: Control Settings Panel (5 cols) -->
    <section class="lg:col-span-5 space-y-6">
      
      <!-- Pager Content Control (with enlarged texts and labels) -->
      <div class="bg-white border border-slate-100 rounded-xl p-6 space-y-5 card-shadow">
        <div class="border-b border-slate-50 pb-3">
          <h2 class="text-sm font-bold tracking-wider text-slate-800 uppercase flex items-center gap-2">
            <i class="fa-regular fa-comment-dots text-slate-800 text-sm"></i> LCD 디스플레이 설정
          </h2>
        </div>
        
        <div class="space-y-4">
          <!-- Textarea for 2 Lines Message -->
          <div>
            <div class="flex justify-between items-center mb-1.5">
              <label for="pagerMessage" class="block text-sm font-semibold text-slate-500">📟 출력 문구 입력 (최대 2줄)</label>
              <!-- Shortcut Hearts insertion buttons -->
              <div class="flex gap-1">
                <button onclick="insertAtCursor('♡')" class="px-2 py-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded text-xs font-bold text-slate-700 transition">♡</button>
                <button onclick="insertAtCursor('♥')" class="px-2 py-1 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded text-xs font-bold text-slate-700 transition">♥</button>
              </div>
            </div>
            <textarea id="pagerMessage" rows="2" max="40" oninput="drawPager()" 
              class="w-full px-4 py-3 rounded-lg bg-slate-50 border border-slate-200/60 text-slate-800 font-mono text-base focus:ring-1 focus:ring-slate-400 focus:border-slate-400 outline-none transition resize-none h-24" 
              placeholder="줄바꿈(Enter) 시 2줄로 출력됩니다.">緊急呼出&#10;889-9191</textarea>
          </div>

          <!-- Time Setting -->
          <div>
            <label for="pagerTime" class="block text-sm font-semibold text-slate-500 mb-1.5">⏰ 표시 시간 (좌측 상단)</label>
            <input type="text" id="pagerTime" value="9月11日 11:09 AM" oninput="drawPager()" 
              class="w-full px-4 py-3 rounded-lg bg-slate-50 border border-slate-200/60 text-slate-800 text-sm font-mono focus:ring-1 focus:ring-slate-400 focus:border-slate-400 outline-none transition">

                <option value="4" selected>최대 수신 (4칸)</option>
                <option value="3">양호함 (3칸)</option>
                <option value="2">미약함 (2칸)</option>
                <option value="1">수신 불가 (圈外)</option>
              </select>
            </div>

            <!-- Battery Level Indicator Input -->
            <div>
              <label for="batteryLevel" class="block text-sm font-semibold text-slate-500 mb-1.5">🔋 배터리 용량 (우측 상단)</label>
              <select id="batteryLevel" onchange="drawPager()" class="w-full px-3 py-2.5 rounded-lg bg-slate-50 border border-slate-200/60 text-slate-700 text-sm focus:ring-1 focus:ring-slate-400 focus:border-slate-400 outline-none cursor-pointer transition">
                <option value="3" selected>가득 참 (100%)</option>
                <option value="2">보통 (60%)</option>
                <option value="1">부족함 (20%)</option>
                <option value="0">교체 필요 (0%)</option>
              </select>
            </div>
          </div>

          <!-- Simple Backlight Toggle nested in LCD settings -->
          <div class="flex items-center justify-between p-3.5 bg-slate-50 rounded-lg border border-slate-100 mt-2">

            </div>
            <input type="checkbox" id="backlight" onchange="drawPager()" class="w-4 h-4 text-slate-900 bg-white border-slate-300 rounded focus:ring-slate-900 cursor-pointer">

        </div>

  <!-- Clean Footer -->
  <footer class="w-full max-w-5xl mx-auto px-6 py-8 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center text-[11px] text-slate-400 gap-4 mt-12">
    <p>© 2026 Pocket Bell Studio. All assets computed via clean high-density vector renderers.</p>
    <div class="flex items-center space-x-4">
      <span class="flex items-center space-x-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-slate-500">Perfect Render Engine v3.5</span>
      </span>
    </div>

  <script>
    let audioCtx = null;

    // Classic 90s piezo buzzer sound emulator
    function playPagerBeep() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const now = audioCtx.currentTime;
        
        const playTone = (time, duration, freq = 2820) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc.type = 'square'; // Raw square-wave matches micro-buzzer output perfectly
          osc.frequency.setValueAtTime(freq, time);
          
          gain.gain.setValueAtTime(0.05, time);
          gain.gain.exponentialRampToValueAtTime(0.001, time + duration - 0.005);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.start(time);
          osc.stop(time + duration);
        };

        // Standard double beep melody
        playTone(now, 0.06);
        playTone(now + 0.10, 0.06);
      } catch (e) {
        console.warn("Audio Context setup delayed until user interaction", e);
      }
    }

    window.onload = function() {
      drawPager();

      // Mouse/Touch interaction support directly on the canvas elements
      const canvas = document.getElementById('pagerCanvas');
      canvas.addEventListener('click', handleCanvasClick);
    };

    function insertAtCursor(char) {
      const input = document.getElementById('pagerMessage');
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const text = input.value;
      input.value = text.substring(0, start) + char + text.substring(end);
      input.focus();
      input.selectionStart = input.selectionEnd = start + char.length;
      drawPager();
    }

    function drawPager() {
      const canvas = document.getElementById('pagerCanvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      // Clean drawing space
      ctx.clearRect(0, 0, width, height);

      // Core Device Body Parameters (Perfect Centering)
      const px = 150;
      const py = 150;
      const pw = 900;
      const ph = 600;

      // 1. PHYSICAL BODY BASE DROP SHADOW
      ctx.save();
      ctx.shadowColor = 'rgba(0, 0, 0, 0.08)';
      ctx.shadowBlur = 40;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 18;

      // 2. MAIN SINGLE-TONE MATTE CHARCOAL BLACK SHELL (은색 베젤 없이 무광 블랙 단색 본체)
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 40);
      ctx.fillStyle = '#17171a'; // Clean pure dark gray/black casing
      ctx.fill();
      ctx.restore();

      // Body Bevel Edge Highlight (Dark 3D highlight)
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(px, py, pw, ph, 40);
      ctx.strokeStyle = '#26262b';
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.restore();

      // 3. LCD SCREEN OUTLINE RECESS HOUSING (은빛 경계 없이 본체에 매끄럽게 함몰된 화면부 구획)
      const lW = pw - 120; // 780px Width
      const lH = ph - 240; // 360px Height (넓고 시원한 액정 면적 확보)
      const lX = px + (pw - lW) / 2; // Centered horizontally
      const lY = py + 55;  // Positioned beautifully in the upper half

      ctx.save();
      ctx.fillStyle = '#0a0a0c'; // Inner deep socket border
      ctx.beginPath();
      ctx.roundRect(lX - 8, lY - 8, lW + 16, lH + 16, 12);
      ctx.fill();
      ctx.restore();

      // 4. RETRO ELECTRONIC GREY-GREEN LCD SCREEN BACKGROUND
      ctx.save();
      const hasBacklight = document.getElementById('backlight').checked;
      
      if (hasBacklight) {
        // Soft glowing jade-green backlight gradient
        const backlightGrad = ctx.createRadialGradient(
          lX + lW/2, lY + lH/2, 100,
          lX + lW/2, lY + lH/2, lW
        );
        backlightGrad.addColorStop(0, '#a2fab0'); 
        backlightGrad.addColorStop(1, '#78da8a');
        ctx.fillStyle = backlightGrad;
      } else {
        // Classic gray-green electronic watch shade (맑고 차분한 회색빛 연녹색)
        ctx.fillStyle = '#abc1a6'; 
      }
      
      ctx.beginPath();
      ctx.roundRect(lX, lY, lW, lH, 8);
      ctx.fill();

      // Delicate inner LCD border line
      ctx.strokeStyle = '#5a6b58';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.roundRect(lX, lY, lW, lH, 8);
      ctx.stroke();
      ctx.restore();

      const timeStr = document.getElementById('pagerTime').value || '';
      const signalVal = parseInt(document.getElementById('signalStrength').value);
      const batteryVal = parseInt(document.getElementById('batteryLevel').value);

      ctx.save();
      ctx.fillStyle = '#1a2417';
      ctx.strokeStyle = '#1a2417';

      // --- LEFT TOP HUD : Antenna Bar + Display Time (Scaled up for prominent readability) ---
      // A. Antenna Symbol Drawing (left-aligned) - Bold pixel style
      const antX = lX + 25;
      const antY = lY + 24;
      
      ctx.save();
      const menuColor = 'rgba(18, 25, 17, 0.75)'; // Softened to match liquid crystal panel sub-pixels
      ctx.fillStyle = menuColor;
      ctx.strokeStyle = menuColor;
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.moveTo(antX + 15, antY + 26);
      ctx.lineTo(antX + 15, antY + 2);
      ctx.moveTo(antX + 3, antY + 2);
      ctx.lineTo(antX + 27, antY + 2);
      ctx.stroke();

      // Signal Strength bars - Highly visible & thick bars
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = (signalVal > i) ? menuColor : 'rgba(18, 25, 17, 0.08)';
        ctx.fillRect(antX + 34 + (i * 9), antY + 26 - (i * 8), 5, i * 8 + 2);
      }
      ctx.restore();

      // B. Display Time - Font size increased to 27px for clear presence
      ctx.save();
      ctx.fillStyle = menuColor;
      ctx.font = '900 27px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(timeStr, antX + 85, antY - 1);
      ctx.restore();

      // --- RIGHT TOP HUD : Battery Capacity (Thicker, larger layout to match time) ---
      const batX = lX + lW - 95;
      const batY = lY + 24;

      ctx.save();
      ctx.strokeStyle = menuColor;
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      ctx.roundRect(batX, batY, 52, 26, 4);
      ctx.stroke();
      
      // Battery Tip
      ctx.fillStyle = menuColor;
      ctx.fillRect(batX + 52, batY + 7, 4, 12);

      // Draw Battery Inside bars
      for (let i = 0; i < 3; i++) {
        if (batteryVal > i) {
          ctx.fillStyle = menuColor;
          ctx.fillRect(batX + 5 + (i * 15), batY + 5, 12, 16);
        }
      }
      ctx.restore();

      // Solid Horizontal separator dividing LCD HUD from the main workspace (Shifted lower to give menu bar space)
      ctx.beginPath();
      ctx.moveTo(lX + 15, lY + 70);
      ctx.lineTo(lX + lW - 15, lY + 70);
      ctx.strokeStyle = 'rgba(18, 25, 17, 0.2)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.restore();

      // 6. STREAMING_CHUNK: High-clarity Dot Matrix Message Projection (Adjusted vertical offset for balance)
      const message = document.getElementById('pagerMessage').value || '';
      
      // Crisp monochrome digital liquid crystal pixel style configuration
      const pixelCol = 'rgba(18, 25, 17, 0.95)';
      const pixelOffCol = 'rgba(18, 25, 17, 0.025)'; // Faint ghost background LCD grids

      // Render the digital display utilizing an offscreen buffer (Starting at Y + 85 for perfect symmetry)
      renderPixelMessage(ctx, message, lX + 25, lY + 85, lW - 50, lH - 105, 3.0, pixelCol, pixelOffCol);

      // Gloss reflection layer over screen glass for absolute realism
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(lX, lY, lW, lH, 8);
      ctx.clip();
      
      const reflection = ctx.createLinearGradient(lX, lY, lX + lW, lY + lH);
      reflection.addColorStop(0, 'rgba(255, 255, 255, 0.08)');
      reflection.addColorStop(0.3, 'rgba(255, 255, 255, 0.0)');
      reflection.addColorStop(1, 'rgba(255, 255, 255, 0.01)');
      ctx.fillStyle = reflection;
      ctx.fill();
      ctx.restore();

      // 7. STREAMING_CHUNK: Rendering Pill-Shaped Buttons with wider spacing
      // 물리 버튼 그리기 (ESC와 SET 사이의 여유로운 공간 확보를 위해 넓게 배치)
      drawClassicPillButton(ctx, px + 140, py + 510, 130, 60, 'ESC');
      drawClassicPillButton(ctx, px + 340, py + 510, 130, 60, 'SET');
      
      // 우측 하단 방향키 지우고, POCKET BELL 로고 멋지게 프린팅
      drawPrintedLogo(ctx, px + 710, py + 510);

      // Notification Pilot Light (Micro LED indicator at top-right edge)
      ctx.save();
      ctx.beginPath();
      ctx.arc(px + pw - 60, py + 26, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#dc2626'; // Vivid retro LED Red
      ctx.fill();
      ctx.beginPath();
      ctx.arc(px + pw - 62, py + 24, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.restore();
    }

    /**
     * Renders any text strings at a high-density dot matrix layout utilizing offscreen pixel extracting logic.
     * This achieves incredibly sharp, angular retro electronic-watch style representation.
     * Supports newline split for 2 lines.
     */
    function renderPixelMessage(ctx, text, x, y, maxW, maxH, pixelSize, pixelColor, pixelOffColor) {
      if (!text) return;

      const buffer = document.createElement('canvas');
      const bCtx = buffer.getContext('2d');
      
      // Create offscreen canvas proportionate to LCD size
      buffer.width = Math.ceil(maxW / pixelSize);
      buffer.height = Math.ceil(maxH / pixelSize);
      
      bCtx.fillStyle = '#000000';
      bCtx.textAlign = 'center';
      bCtx.textBaseline = 'middle';

      const lines = text.split('\n').slice(0, 2); // Limit to maximum 2 lines
      
      if (lines.length === 1) {
        // High visibility larger font size for single-line projection
        bCtx.font = 'bold 24px "Noto Sans KR", "JetBrains Mono", sans-serif';
        bCtx.fillText(lines[0], buffer.width / 2, buffer.height / 2 + 1);
      } else {
        // Sophisticated custom offset sizing for perfect 2-line rendering layout
        bCtx.font = 'bold 16px "Noto Sans KR", "JetBrains Mono", sans-serif';
        bCtx.fillText(lines[0], buffer.width / 2, buffer.height / 2 - 12);
        bCtx.fillText(lines[1], buffer.width / 2, buffer.height / 2 + 12);
      }

      const imgData = bCtx.getImageData(0, 0, buffer.width, buffer.height);
      const data = imgData.data;

      ctx.save();
      ctx.translate(x, y);

      const gap = 1; // 1px spacing between liquid crystal units

      // Loop and paint individual physical micro dot matrix segments
      for (let r = 0; r < buffer.height; r++) {
        for (let c = 0; c < buffer.width; c++) {
          const idx = (r * buffer.width + c) * 4;
          const alpha = data[idx + 3];
          
          const dx = c * pixelSize;
          const dy = r * pixelSize;

          if (alpha > 90) { // Clear sharp binary pixel mask
            ctx.fillStyle = pixelColor;
            ctx.fillRect(dx, dy, pixelSize - gap, pixelSize - gap);
          } else {
            // Faint grid layout placeholder pattern for absolute digital fidelity
            ctx.fillStyle = pixelOffColor;
            ctx.fillRect(dx, dy, pixelSize - gap, pixelSize - gap);
          }
        }
      }
      ctx.restore();
    }

    function drawClassicPillButton(ctx, x, y, w, h, txt) {
      ctx.save();
      // Socket depth shadow
      ctx.fillStyle = '#0a0a0c';
      ctx.beginPath();
      ctx.roundRect(x - w/2, y - h/2 + 4, w, h, h/2);
      ctx.fill();

      // Outer Bezel/Rim
      ctx.fillStyle = '#17171a';
      ctx.strokeStyle = '#2d2d35';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.roundRect(x - w/2, y - h/2, w, h, h/2);
      ctx.fill();
      ctx.stroke();

      // Top Face of push button (Alkyak Capsule Gradient)
      const btnFace = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
      btnFace.addColorStop(0, '#3f3f46');
      btnFace.addColorStop(0.4, '#27272a');
      btnFace.addColorStop(1, '#18181b');
      ctx.fillStyle = btnFace;
      ctx.beginPath();
      ctx.roundRect(x - w/2 + 3, y - h/2 + 3, w - 6, h - 6, (h - 6)/2);
      ctx.fill();

      // Highlight inner stroke
      ctx.strokeStyle = '#52525b';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Typography - Bold and Big text size inside pill shape
      ctx.fillStyle = '#f4f4f5';
      ctx.font = 'bold 18px "Inter", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(txt, x, y);
      ctx.restore();
    }

    function drawPrintedLogo(ctx, x, y) {
      ctx.save();
      // Matte Silver-grey printed brand typography (Clean, minimalist 90s aesthetic)
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // Shadow layer to give a subtle engraved screen-print look
      ctx.fillStyle = '#09090b';
      ctx.font = '900 36px "Inter", sans-serif';
      ctx.letterSpacing = '5px';
      ctx.fillText('POCKET BELL', x, y + 2);

      // Top layer
      ctx.fillStyle = '#a1a1aa'; // Pure matte metallic grey text color
      ctx.font = '900 36px "Inter", sans-serif';
      ctx.letterSpacing = '5px';
      ctx.fillText('POCKET BELL', x, y);
      ctx.restore();
    }

    // Handles button coordinate mapping logic for clicks on canvas parts
    function handleCanvasClick(e) {
      const canvas = document.getElementById('pagerCanvas');
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;

      // Alignment anchors
      const px = 150;
      const py = 150;

      // Pill-shaped coordinates boundary check (더 넓어진 ESC/SET 버튼 중심축에 매칭)
      const escX = px + 140;
      const escY = py + 510;
      const setX = px + 340;
      const setY = py + 510;

      // ESC Button (Pill boundary detection box)
      if (x >= escX - 65 && x <= escX + 65 && y >= escY - 30 && y <= escY + 30) {
        // Toggle illumination light mode
        const toggle = document.getElementById('backlight');
        toggle.checked = !toggle.checked;
        playPagerBeep();
        drawPager();
        return;
      }

      // SET Button (Pill boundary detection box)
      if (x >= setX - 65 && x <= setX + 65 && y >= setY - 30 && y <= setY + 30) {
        // Trigger alert buzzer noise
        playPagerBeep();
        return;
      }
    }

    // Compiles drawing context into crisp high-density png files with alpha transparencies
    function downloadPagerPNG() {
      const canvas = document.getElementById('pagerCanvas');
      if (!canvas) return;

      try {
        const url = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = url;
        link.download = `POCKET_BELL_STUDIO_${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      } catch (err) {
        console.error("Unable to capture canvas buffer stream", err);
      }
    }
  </script>
</body>
</html>
